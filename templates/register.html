<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
  body{
margin:0;
font-family:'Segoe UI';
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.2);
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

input:focus{
border:1px solid #4CAF50;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#43a047;
}

a{
display:block;
margin-top:10px;
color:#4CAF50;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

.error{
color:red;
margin-top:10px;
}
</style>
</head>
<body style="text-align:center;padding-top:100px;font-family:Segoe UI;">
<h2>Register</h2>
<form method="POST" action="/register_post">
<input name="username" placeholder="Username" required><br><br>
<input type="password" name="password" placeholder="Password" required><br><br>
<button>Register</button>
</form>
</body>
</html>
